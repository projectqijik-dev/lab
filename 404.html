<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sayfa Bulunamadı — Lab.kirkyama.uk</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Crimson+Pro:ital@1&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07091a;
      color: #e8e4d9;
      font-family: 'Crimson Pro', Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .code {
      font-family: 'Cinzel', serif;
      font-size: clamp(72px, 15vw, 120px);
      font-weight: 900;
      background: linear-gradient(130deg, #e8e4d9 0%, #c9a84c 52%, #e8e4d9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(16px, 3vw, 22px);
      font-weight: 700;
      color: #c9a84c;
      margin-bottom: 12px;
      letter-spacing: 0.1em;
    }
    p { font-size: 16px; color: #6b7a9e; font-style: italic; margin-bottom: 36px; }
    a {
      display: inline-block;
      padding: 10px 28px;
      border: 1px solid #c9a84c;
      border-radius: 100px;
      color: #c9a84c;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 0.12em;
      transition: background 0.2s;
    }
    a:hover { background: rgba(201,168,76,0.12); }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Sayfa Bulunamadı</h1>
  <p>Aradığın sayfa tarih olmuş olabilir…</p>
  <a href="/index.html">← Ana Sayfaya Dön</a>
</body>
</html>
